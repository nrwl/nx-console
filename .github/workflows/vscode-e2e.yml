name: VS Code E2E

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24
  JAVA_VERSION: 21
  NX_CLOUD_NO_TIMEOUTS: true
  NX_PLUGIN_NO_TIMEOUTS: true
  NX_CLOUD_ACCESS_TOKEN: ${{ github.ref == 'refs/heads/master' && secrets.NX_CLOUD_READ_WRITE_TOKEN || secrets.NX_CLOUD_READ_TOKEN }}

jobs:
  main-linux:
    name: VS Code E2E
    runs-on: ubuntu-latest
    env:
      NX_CI_EXECUTION_ENV: 'linux'
      NX_VERBOSE_LOGGING: true
      PLAYWRIGHT_VSCODE_VIDEO: '1'
      GIT_AUTHOR_EMAIL: test@test.com
      GIT_AUTHOR_NAME: Test
      GIT_COMMITTER_EMAIL: test@test.com
      GIT_COMMITTER_NAME: Test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true
          cache: yarn

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install NPM dependencies
        run: yarn install --immutable

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg

      - name: Run VS Code E2E
        run: yarn nx run vscode-e2e:e2e

      - name: Upload VS Code E2E videos
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vscode-e2e-videos-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/apps/vscode-e2e/videos
          if-no-files-found: warn
          retention-days: 14

      - name: Upload VS Code E2E diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vscode-e2e-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/apps/vscode-e2e/diagnostics
            dist/apps/vscode-e2e/test-results
            dist/apps/vscode-e2e/playwright-report
            /tmp/vscode-e2e-runner-logs
          if-no-files-found: warn
          retention-days: 14
