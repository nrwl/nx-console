name: Publish VSCode

on:
  release:
    types: [published]
env:
  node_version: 24
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_READ_WRITE_TOKEN }}

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'vscode-v')
    environment: release-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Use Node.js ${{ env.node_version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.node_version }}
          check-latest: true
          cache: yarn
      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17
          cache: gradle
      - run: yarn install --immutable
        shell: bash
      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1
        with:
          main-branch-name: 'master'
      - name: publish to vscode marketplace
        run: |
          node ./tools/scripts/clear-dist.js
          npx nx run vscode:package --skip-nx-cache
          yarn vsce publish --packagePath dist/apps/vscode/nx-console.vsix -p ${{ secrets.VSCE_PAT }}
      - name: attach vsix to the GitHub Release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/apps/vscode/nx-console.vsix --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: publish to open-vsx marketplace
        run: |
          yarn ovsx publish dist/apps/vscode/nx-console.vsix -p ${{ secrets.OVSX_PAT }}
